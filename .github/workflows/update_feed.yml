name: Update Academic Feed

on:
  schedule:
    # 毎日午前6時と午後6時（日本時間）に自動実行
    - cron: '0 9,21 * * *'
  workflow_dispatch: # 手動で即時実行できるようにする

permissions:
  contents: write # 変更された articles.json を保存するために必要

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/update_feed.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles.json
          # 変更がある場合のみ保存
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update articles database [skip ci]" && git push)
